# Build, test and package the X4StationBuilder WPF desktop application (.NET).
#
# - On pushes to `main` and pull requests: restore, build and test in Release.
# - On version tag pushes (e.g. `v1.2.3`): additionally publish the WPF app,
#   zip it and attach it to a GitHub Release.
#
# For more information on GitHub Actions, refer to https://github.com/features/actions

name: .NET Core Desktop

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: windows-latest  # WPF requires Windows. For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    permissions:
      contents: write  # required to create GitHub Releases

    env:
      Configuration: Release
      Solution_Name: X4StationBuilder.slnx
      App_Project_Path: X4StationBuilder.App\X4StationBuilder.App.csproj

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install the .NET SDK
    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    # Restore the solution
    - name: Restore the solution
      run: dotnet restore $env:Solution_Name

    # Build the solution
    - name: Build the solution
      run: dotnet build $env:Solution_Name -c $env:Configuration --no-restore

    # Execute all unit tests in the solution
    - name: Execute unit tests
      run: dotnet test $env:Solution_Name -c $env:Configuration --no-build

    # Publish the WPF application
    - name: Publish the application
      run: dotnet publish $env:App_Project_Path -c $env:Configuration --no-build -o publish

    # Zip the published output for distribution
    - name: Package the application
      run: Compress-Archive -Path publish\* -DestinationPath X4StationBuilder-${{ github.ref_name }}.zip

    # Upload the package as a workflow build artifact
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: X4StationBuilder-Release
        path: X4StationBuilder-${{ github.ref_name }}.zip

    # Create a GitHub Release (only when a version tag is pushed) and attach the package
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: X4StationBuilder-${{ github.ref_name }}.zip
        generate_release_notes: true
